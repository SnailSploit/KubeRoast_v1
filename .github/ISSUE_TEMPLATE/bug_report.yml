name: Bug report
description: Report a defect in KubeRoast
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough information for someone to reproduce.
  - type: input
    id: version
    attributes:
      label: KubeRoast version
      description: Output of `kuberoast --version`
      placeholder: "kuberoast 0.3.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command run
      description: Exact CLI invocation
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior (include error output / stack trace)
      render: shell
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Cluster type (kind/minikube/EKS/...), kubeconfig sanitization status, etc.
